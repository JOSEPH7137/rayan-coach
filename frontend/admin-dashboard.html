<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#FFFFFF"/>
<title>Admin Dashboard - Rayan Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="light-mode">

<nav class="main-nav">
  <div class="nav-logo">
    <div class="logo-icon">Rc</div>
    <div>
      <div class="logo-text">RAYAN COACH</div>
      <div class="logo-sub">ADMIN PORTAL</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="admin-dashboard.html" class="nav-link active-nav">Dashboard</a>
    <a href="#" onclick="showToast('Drivers','info')" class="nav-link">Drivers</a>
    <a href="#" onclick="showToast('Fleet','info')" class="nav-link">Fleet</a>
    <a href="index.html" class="nav-link" onclick="localStorage.removeItem('loggedIn')">Logout</a>
  </div>
  <div class="nav-actions">
    <div class="theme-toggle" onclick="toggleTheme()">
      <i class="fas fa-moon"></i>
      <span>Dark</span>
    </div>
  </div>
</nav>

<div class="dashboard-container" style="padding: 120px 40px 40px;">
  <div class="grid-4">
    <div class="stat-card"><div class="stat-value">14</div><div class="stat-label">Active Trips</div></div>
    <div class="stat-card"><div class="stat-value">KES 84K</div><div class="stat-label">Revenue Today</div></div>
    <div class="stat-card"><div class="stat-value">31</div><div class="stat-label">Active Drivers</div></div>
    <div class="stat-card"><div class="stat-value">3</div><div class="stat-label">Alerts</div></div>
  </div>
  <div class="card card-pad mt-24">
    <h3>Quick Actions</h3>
    <div class="flex gap-16 mt-16">
      <button class="btn btn-gold" onclick="showToast('Add Driver','info')">+ Add Driver</button>
      <button class="btn btn-gold" onclick="showToast('Add Vehicle','info')">+ Add Vehicle</button>
      <button class="btn btn-gold" onclick="showToast('Create Trip','success')">Create Trip</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  loadTheme();
});
</script>
</body>
</html>
