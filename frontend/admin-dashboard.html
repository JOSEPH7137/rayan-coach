<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#FFFFFF"/>
<title>Admin Dashboard - Rayan Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="css/style.css"/>

<body class="light-mode">

<div class="dashboard-wrapper">
  <!-- Sidebar -->

    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-nav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
      <a href="#" class="sidebar-nav-item" data-page="tracking"><i class="fas fa-map-marked-alt"></i><span>Live Tracking</span></a>
      <a href="#" class="sidebar-nav-item" data-page="drivers"><i class="fas fa-users"></i><span>Drivers</span></a>
      <a href="#" class="sidebar-nav-item" data-page="fleet"><i class="fas fa-bus"></i><span>Fleet</span></a>

      <a href="#" class="sidebar-nav-item" data-page="payments"><i class="fas fa-credit-card"></i><span>Payments</span></a>

      <a href="#" class="sidebar-nav-item" data-page="analytics"><i class="fas fa-chart-pie"></i><span>Analytics</span></a>

      <a href="#" class="sidebar-nav-item logout-btn" onclick="handleAdminLogout()">

    </div>

  <!-- Main Content -->

        <div class="theme-toggle-small" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>

        </div>

    </header>
    <div class="dashboard-content" id="pageContent"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

function toggleSidebar() {

}

function navigateTo(page) {
  currentPage = page;

    item.classList.remove('active');

  });

    dashboard: 'Admin Dashboard', 
    tracking: 'Live Tracking', 
    drivers: 'Drivers Management', 
    fleet: 'Fleet Management', 
    dispatch: 'Dispatch Center', 
    payments: 'Payments & Finance', 
    compliance: 'Compliance', 
    analytics: 'Analytics & Reports', 
    audit: 'Audit Logs', 
    settings: 'Settings'
  };
  document.getElementById('pageTitle').textContent = titles[page] || 'Admin Dashboard';
  loadPageContent(page);
}

// Admin functions
function createTrip() {
  showToast('Trip created successfully!', 'success');
}

function processPayouts() {
  showToast('Processing driver payouts...', 'info');
}

function sendReminder(name) {
  showToast(`Reminder sent to ${name}`, 'success');
}

function downloadReport() {
  showToast('Downloading report...', 'info');
}

function exportData() {
  showToast('Exporting data to CSV...', 'info');
}

function saveSettings() {
  showToast('Settings saved successfully!', 'success');
}

function resetSettings() {
  showToast('Settings reset to defaults', 'info');
}

async function handleAdminLogout() {
  await logoutUser();
}

// Load user data on page load
async function loadUserData() {
  const user = await getCurrentUser();
  if (user) {
    currentUser = user;
    
    const { data: profile } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();
    
    userProfile = profile;
    
    document.getElementById('userName').textContent = profile?.name || user.email;
    document.getElementById('userAvatar').textContent = profile?.name?.charAt(0) || user.email?.charAt(0);
  }
}

// Initialize page
document.addEventListener('DOMContentLoaded', async function() {
  loadTheme();
  
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    window.location.href = 'role-selection.html';
    return;
  }
  
  // Check if user is admin
  const { data: profile } = await supabase
    .from('profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();
  
  if (profile?.role !== 'admin') {
    showToast('Unauthorized access. Admin privileges required.', 'error');
    window.location.href = 'role-selection.html';
    return;
  }
  
  await loadUserData();
  loadPageContent('dashboard');
  
  document.querySelectorAll('.sidebar-nav-item[data-page]').forEach(item => {
    item.addEventListener('click', (e) => { 
      e.preventDefault(); 
      navigateTo(item.getAttribute('data-page')); 
    });
  });
});

// Make functions global
window.toggleSidebar = toggleSidebar;
window.navigateTo = navigateTo;
window.createTrip = createTrip;
window.processPayouts = processPayouts;
window.sendReminder = sendReminder;
window.downloadReport = downloadReport;
window.exportData = exportData;
window.saveSettings = saveSettings;
window.resetSettings = resetSettings;
window.handleAdminLogout = handleAdminLogout;
</script>
</body>
</html>
