<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#FFFFFF"/>
<title>Driver Dashboard - Rayan Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="light-mode">

<div class="dashboard-wrapper">
  <!-- Sidebar -->
  <aside class="dashboard-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">Rc</div>
      <div>
        <div class="sidebar-logo-text">RAYAN COACH</div>
        <div class="sidebar-role-badge">DRIVER PORTAL</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-nav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
      <a href="#" class="sidebar-nav-item" data-page="trips"><i class="fas fa-bus"></i><span>My Trips</span></a>
      <a href="#" class="sidebar-nav-item" data-page="gps"><i class="fas fa-map-marked-alt"></i><span>GPS Tracking</span></a>
      <a href="#" class="sidebar-nav-item" data-page="earnings"><i class="fas fa-money-bill-wave"></i><span>Earnings</span></a>
      <a href="#" class="sidebar-nav-item" data-page="messages"><i class="fas fa-comment"></i><span>Messages</span></a>
      <a href="#" class="sidebar-nav-item" data-page="incident"><i class="fas fa-exclamation-triangle"></i><span>Incident Report</span></a>
      <a href="#" class="sidebar-nav-item" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
      <a href="#" class="sidebar-nav-item" data-page="performance"><i class="fas fa-chart-line"></i><span>Performance</span></a>
      <a href="#" class="sidebar-nav-item" data-page="reviews"><i class="fas fa-star"></i><span>My Reviews</span></a>
      <a href="#" class="sidebar-nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="sidebar-nav-item logout-btn" onclick="handleDriverLogout()">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-main">
    <header class="dashboard-topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h3 class="page-title" id="pageTitle">Driver Dashboard</h3>
      <div class="topbar-right">
        <div class="notification-bell" onclick="showToast('You have 2 new notifications','info')"><i class="fas fa-bell"></i><span class="notification-dot"></span></div>
        <div class="theme-toggle-small" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
        <div class="user-profile" onclick="navigateTo('profile')">
          <div class="user-avatar" id="userAvatar">JM</div>
          <span class="user-name" id="userName">Loading...</span>
        </div>
      </div>
    </header>
    <div class="dashboard-content" id="pageContent"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="driver-dashboard.js"></script>
</body>
</html>
