<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#FFFFFF"/>
<title>User Dashboard - Rayan Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="light-mode">

<div class="dashboard-wrapper">
  <aside class="dashboard-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">Rc</div>
      <div>
        <div class="sidebar-logo-text">RAYAN COACH</div>
        <div class="sidebar-role-badge">USER PORTAL</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-nav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
      <a href="#" class="sidebar-nav-item" data-page="booking"><i class="fas fa-ticket-alt"></i><span>Book Ticket</span></a>
      <a href="#" class="sidebar-nav-item" data-page="tracking"><i class="fas fa-map-marker-alt"></i><span>Live Tracking</span></a>
      <a href="#" class="sidebar-nav-item" data-page="parcel"><i class="fas fa-box"></i><span>Parcel Delivery</span></a>
      <a href="#" class="sidebar-nav-item" data-page="tickets"><i class="fas fa-ticket-alt"></i><span>My Tickets</span></a>
      <a href="#" class="sidebar-nav-item" data-page="rewards"><i class="fas fa-gift"></i><span>Rewards</span></a>
      <a href="#" class="sidebar-nav-item" data-page="messages"><i class="fas fa-comment"></i><span>Messages</span></a>
      <a href="#" class="sidebar-nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>
      <a href="#" class="sidebar-nav-item" data-page="reviews"><i class="fas fa-star"></i><span>Rate Journey</span></a>
      <a href="#" class="sidebar-nav-item" data-page="safety"><i class="fas fa-shield-alt"></i><span>Safety & SOS</span></a>
    </nav>
    <div class="sidebar-footer">
  <a href="#" class="sidebar-nav-item logout-btn" onclick="handleLogout()">
    <i class="fas fa-sign-out-alt"></i><span>Logout</span>
</a>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="dashboard-topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h3 class="page-title" id="pageTitle">Dashboard</h3>
      <div class="topbar-right">
        <div class="notification-bell" onclick="showToast('You have 3 new notifications','info')"><i class="fas fa-bell"></i><span class="notification-dot"></span></div>
        <div class="theme-toggle-small" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
        <div class="user-profile" onclick="navigateTo('profile')">
          <div class="user-avatar" id="userAvatar">JD</div>
          <span class="user-name" id="userName">Loading...</span>
        </div>
      </div>
    </header>
    <div class="dashboard-content" id="pageContent"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="user-dashboard.js"></script>
</body>
</html>
