<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#FFFFFF"/>
<title>User Dashboard - Rayan Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="light-mode">

<div class="dashboard-wrapper">
  <!-- Sidebar -->
  <aside class="dashboard-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">Rc</div>
      <div>
        <div class="sidebar-logo-text">RAYAN COACH</div>
        <div class="sidebar-role-badge">USER PORTAL</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-nav-item active" data-page="dashboard">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="booking">
        <i class="fas fa-ticket-alt"></i>
        <span>Book Ticket</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="tracking">
        <i class="fas fa-map-marker-alt"></i>
        <span>Live Tracking</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="parcel">
        <i class="fas fa-box"></i>
        <span>Parcel Delivery</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="tickets">
        <i class="fas fa-ticket-alt"></i>
        <span>My Tickets</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="rewards">
        <i class="fas fa-gift"></i>
        <span>Rewards</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="messages">
        <i class="fas fa-comment"></i>
        <span>Messages</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="profile">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </a>
      <a href="#" class="sidebar-nav-item" data-page="safety">
        <i class="fas fa-shield-alt"></i>
        <span>Safety & SOS</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-nav-item logout-btn" onclick="localStorage.removeItem('loggedIn')">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-main">
    <header class="dashboard-topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h3 class="page-title" id="pageTitle">Dashboard</h3>
      <div class="topbar-right">
        <div class="notification-bell" onclick="showToast('You have 3 new notifications','info')">
          <i class="fas fa-bell"></i>
          <span class="notification-dot"></span>
        </div>
        <div class="theme-toggle-small" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </div>
        <div class="user-profile" onclick="navigateTo('profile')">
          <div class="user-avatar">JK</div>
          <span class="user-name">John Kamau</span>
        </div>
      </div>
    </header>

    <div class="dashboard-content" id="pageContent">
      <!-- Dashboard Content will be loaded here -->
    </div>
  </main>
</div>

<!-- Add before your app.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script>

// Check if user is logged in, redirect to login if not
document.addEventListener('DOMContentLoaded', async function() {
    loadTheme();
    
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'role-selection.html';
        return;
    }
    
    // Also check stored session for remember me
    const storedSession = localStorage.getItem('supabase_session');
    if (!session && !storedSession) {
        window.location.href = 'role-selection.html';
    }
});

let currentPage = 'dashboard';

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function navigateTo(page) {
  currentPage = page;
  
  // Update active state in sidebar
  document.querySelectorAll('.sidebar-nav-item').forEach(item => {
    item.classList.remove('active');
    if(item.getAttribute('data-page') === page) {
      item.classList.add('active');
    }
  });
  
  // Update page title
  const titles = {
    dashboard: 'Dashboard',
    booking: 'Book Ticket',
    tracking: 'Live Tracking',
    parcel: 'Parcel Delivery',
    tickets: 'My Tickets',
    rewards: 'Loyalty & Rewards',
    messages: 'Messages',
    profile: 'My Profile',
    safety: 'Safety & SOS'
  };
  document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';
  
  // Load page content
  loadPageContent(page);
}

function loadPageContent(page) {
  const content = document.getElementById('pageContent');
  
  const pages = {
    dashboard: `

      </div>
      <div class="stats-grid-dashboard">
        <div class="stat-card-dashboard">
          <div class="stat-header"><div class="stat-icon-dashboard"><i class="fas fa-ticket-alt"></i></div></div>

        </div>
        <div class="stat-card-dashboard">

          <div class="stat-value-dashboard">1,240</div>
          <div class="stat-label-dashboard">Reward Points</div>

        </div>

          <div class="stat-header"><div class="stat-icon-dashboard"><i class="fas fa-money-bill-wave"></i></div></div>
          <div class="stat-value-dashboard">KES 720</div>

          <div class="stat-trend" style="color: var(--green);">via rewards</div>
        </div>
        <div class="stat-card-dashboard">
          <div class="stat-header"><div class="stat-icon-dashboard"><i class="fas fa-box"></i></div></div>
          <div class="stat-value-dashboard">6</div>
          <div class="stat-label-dashboard">Parcels Sent</div>
          <div class="stat-trend" style="color: var(--purple);">2 in transit</div>
        </div>
      </div>
      <div class="dashboard-card">
        <div class="card-title"><i class="fas fa-clock"></i><span>Recent Trips</span></div>
        <div class="trip-item"><div class="trip-info"><h4>Nairobi → Mombasa</h4><p>Today, 07:00 AM • Bus RC-001</p></div><span class="trip-status status-upcoming">Upcoming</span></div>
        <div class="trip-item"><div class="trip-info"><h4>Mombasa → Nairobi</h4><p>Tomorrow, 14:00 PM • Bus RC-002</p></div><span class="trip-status status-upcoming">Upcoming</span></div>

    `,
    
    booking: `
      <div class="dashboard-card">

        <div class="trip-item"><div><h4>7:00 AM - Express</h4><p>KES 1,500 • 3h 30m • WiFi, A/C</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Booking started','success')">Select</button></div>
        <div class="trip-item"><div><h4>10:30 AM - Luxury</h4><p>KES 2,000 • 3h 15m • WiFi, A/C, Refreshments</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Booking started','success')">Select</button></div>
        <div class="trip-item"><div><h4>2:00 PM - Economy</h4><p>KES 1,200 • 4h • A/C</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Booking started','success')">Select</button></div>

    `,
    
    tracking: `

    parcel: `

        <div class="form-group"><label>Delivery Location</label><input type="text" class="input" placeholder="Enter delivery address"></div>
        <div class="form-group"><label>Parcel Weight (kg)</label><input type="number" class="input" placeholder="e.g., 2.5"></div>
        <div class="form-group"><label>Parcel Description</label><textarea class="input" rows="3" placeholder="Describe the item"></textarea></div>
        <button class="btn-dashboard btn-primary" onclick="showToast('Parcel booking initiated','success')">Calculate Price</button>
      </div>
      <div class="dashboard-card mt-16">
        <div class="card-title"><i class="fas fa-history"></i><span>Recent Parcels</span></div>
        <div class="trip-item"><div><h4>Parcel #RC-234</h4><p>Nairobi → Mombasa • Delivered</p></div><span class="trip-status status-completed">Delivered</span></div>
        <div class="trip-item"><div><h4>Parcel #RC-235</h4><p>Nairobi → Kisumu • In Transit</p></div><span class="trip-status status-upcoming">In Transit</span></div>
      </div>
    `,
    
    tickets: `
      <div class="dashboard-card">
        <div class="card-title"><i class="fas fa-ticket-alt"></i><span>My Tickets</span></div>
        <div class="trip-item"><div><h4>Nairobi → Mombasa</h4><p>Date: Today, 07:00 AM • Seat: 12A • Bus: RC-001</p><p>Ticket #: RC-2025-00123</p></div><button class="btn-dashboard btn-outline" onclick="showToast('Ticket downloaded','success')"><i class="fas fa-download"></i> Download</button></div>
        <div class="trip-item"><div><h4>Mombasa → Nairobi</h4><p>Date: Tomorrow, 14:00 PM • Seat: 8B • Bus: RC-002</p><p>Ticket #: RC-2025-00124</p></div><button class="btn-dashboard btn-outline" onclick="showToast('Ticket downloaded','success')"><i class="fas fa-download"></i> Download</button></div>
        <div class="trip-item"><div><h4>Nairobi → Kisumu</h4><p>Date: Mar 25, 2025 • Seat: 15C • Bus: RC-008</p><p>Ticket #: RC-2025-00125</p></div><button class="btn-dashboard btn-outline" onclick="showToast('Ticket downloaded','success')"><i class="fas fa-download"></i> Download</button></div>
      </div>
    `,
    
    rewards: `
      <div class="dashboard-card">
        <div class="card-title"><i class="fas fa-gift"></i><span>My Rewards</span></div>
        <div class="stats-grid-dashboard" style="grid-template-columns: 1fr 1fr;">
          <div class="stat-card-dashboard"><div class="stat-value-dashboard">1,240</div><div class="stat-label-dashboard">Total Points</div></div>
          <div class="stat-card-dashboard"><div class="stat-value-dashboard">3</div><div class="stat-label-dashboard">Available Rewards</div></div>
        </div>
        <div class="trip-item"><div><h4>Free WiFi Voucher</h4><p>100 points • Valid for 1 trip</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Reward redeemed!','success')">Redeem</button></div>
        <div class="trip-item"><div><h4>10% Discount</h4><p>500 points • On next booking</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Reward redeemed!','success')">Redeem</button></div>
        <div class="trip-item"><div><h4>Free Refreshment</h4><p>200 points • On-board snack</p></div><button class="btn-dashboard btn-primary" onclick="showToast('Reward redeemed!','success')">Redeem</button></div>
      </div>

    messages: `

        <div class="card-title"><i class="fas fa-comment"></i><span>Support Chat</span></div>
        <div class="chat-messages" style="height: 300px; overflow-y: auto; background: var(--card2); border-radius: 12px; padding: 16px; margin-bottom: 16px;">

        </div>
      </div>

    profile: `
      <div class="dashboard-card">
        <div class="card-title"><i class="fas fa-user"></i><span>My Profile</span></div>
        <div style="text-align: center; margin-bottom: 24px;">
          <div class="user-avatar" style="width: 80px; height: 80px; font-size: 32px; margin: 0 auto 16px;">JK</div>

        <button class="btn-dashboard btn-primary" onclick="showToast('Profile updated!','success')">Save Changes</button>

    `,
    
    safety: `
      <div class="dashboard-card">
        <div class="card-title"><i class="fas fa-shield-alt"></i><span>Safety & SOS</span></div>
        <div style="text-align: center; padding: 20px;">
          <button class="btn-dashboard btn-danger" style="background: #F04545; color: white; padding: 16px 32px; font-size: 18px;" onclick="showToast('SOS Alert Sent! Emergency services notified.','error')">

        </div>
        <div class="trip-item"><div><h4>Share Your Trip</h4><p>Share your trip details with family</p></div><button class="btn-dashboard btn-outline" onclick="showToast('Trip shared!','success')">Share</button></div>
        <div class="trip-item"><div><h4>Safety Tips</h4><p>View safety guidelines for travelers</p></div><button class="btn-dashboard btn-outline" onclick="showToast('Safety tips loaded','info')">View</button></div>
      </div>
    `
  };
  
  content.innerHTML = pages[page] || pages.dashboard;
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  if(input && input.value.trim()) {
    const chatContainer = document.querySelector('.chat-messages');
    if(chatContainer) {
      const newMsg = document.createElement('div');
      newMsg.className = 'chat-message';
      newMsg.style.marginBottom = '12px';
      newMsg.innerHTML = `<strong>You:</strong> ${input.value}`;
      chatContainer.appendChild(newMsg);
      input.value = '';
      setTimeout(() => {
        const response = document.createElement('div');
        response.className = 'chat-message';
        response.style.marginBottom = '12px';
        response.innerHTML = `<strong>Support:</strong> Thank you for your message. We'll get back to you shortly.`;
        chatContainer.appendChild(response);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }, 1000);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  }
}

document.addEventListener('DOMContentLoaded', function() {
  loadTheme();
  loadPageContent('dashboard');
  
  // Add click handlers to sidebar items
  document.querySelectorAll('.sidebar-nav-item[data-page]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      navigateTo(item.getAttribute('data-page'));
    });
  });
});
</script>
</body>
</html>
