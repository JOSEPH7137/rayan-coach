<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password - Rayan Coach</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.reset-card {
  width: 100%;
  max-width: 420px;
  padding: 30px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.reset-card h2 {
  margin-bottom: 10px;
}
.reset-card p {
  color: #777;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="reset-card">
  <h2>🔐 Reset Password</h2>
  <p>Enter your new password below</p>

  <div class="form-group">
    <label>New Password</label>
    <div class="input-with-icon">
      <i class="fas fa-lock"></i>
      <input type="password" id="newPassword" placeholder="New password">
    </div>
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <div class="input-with-icon">
      <i class="fas fa-lock"></i>
      <input type="password" id="confirmPassword" placeholder="Confirm password">
    </div>
  </div>

  <button class="btn-auth-primary" id="resetBtn" onclick="handleResetPassword()">
    Update Password
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
// 🔥 REQUIRED: Handle Supabase recovery session
window.addEventListener('load', async () => {
  const hash = window.location.hash;

  // Check if user came from email link
  if (hash && hash.includes('access_token')) {

    const { data, error } = await window.supabase.auth.getSession();

    console.log("Recovery session:", data);

    if (error || !data.session) {
      console.error("Session error:", error);
      alert("❌ Invalid or expired reset link");
      window.location.href = "auth.html?role=user";
    }

  } else {
    // Block direct access
    alert("⚠️ Invalid access. Use the reset link sent to your email.");
    window.location.href = "auth.html?role=user";
  }
});
async function handleResetPassword() {
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('resetBtn');

  if (!password || !confirm) {
    alert("Please fill all fields");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters");
    return;
  }

  if (password !== confirm) {
    alert("Passwords do not match");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = "Updating...";

  try {
    const { data, error } = await window.supabase.auth.updateUser({
      password: password
    });

    if (error) {
      console.error(error);
      alert("Failed to update password");
    } else {
      alert("✅ Password updated successfully!");

      // Redirect to login
      setTimeout(() => {
        window.location.href = "auth.html?role=user";
      }, 1500);
    }

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
  }

  btn.disabled = false;
  btn.innerHTML = "Update Password";
}
</script>

</body>
</html>
